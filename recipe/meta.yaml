{% set name = "xgrammar" %}
{% set version = "0.1.19" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 75bf3e814283b1cbaee9252234c5d4081f0058d29b26d8984f1cdf031c99b775
  patches:
    - patches/001_remove_ninja_dep.patch

build:
  # Skipping osx builds for now due to troubls building mlx-lm and mlx packages
  skip: true # [py>313 or osx]
  number: 0


requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja
    - make # [unix]

  host:
    - python
    - scikit-build-core >=0.10.0
    - pip
    - nanobind =2.12
    - numpy {{ numpy }}
    - pytorch =2.7
  run:
    - python
    - numpy >=1.26.0
    - pydantic
    - sentencepiece
    - tiktoken
    - pytorch =2.7
    - transformers >=4.38.0
    - triton # [linux and x86_64]

    # Skipping osx builds for now due to troubls building mlx-lm and mlx packages
    #- mlx-lm # [osx and arm64]

test:
  source_files:
    - tests/
  imports:
    - xgrammar
  commands:
    - pip check
    - pytest -m "not hf_token_required"
  requires:
    - pip
    - protobuf
    - pytest
    - huggingface_hub

about:
  home: https://github.com/mlc-ai/xgrammar
  summary: XGrammar is an open-source library for efficient, flexible, and portable structured generation.
  description: |
    XGrammar is an open-source library for efficient, flexible, and portable
    structured generation. It leverages constrained decoding to ensure 100%
    structural correctness of the output. It supports general context-free
    grammar to enable a broad range of structures, including JSON, regex,
    custom context-free grammar, etc.
  license: Apache-2.0 AND BSD-4-Clause
  license_file:
    - LICENSE
    - NOTICE
  license_family: Apache
  dev_url: https://github.com/mlc-ai/xgrammar
  doc_url: https://github.com/mlc-ai/xgrammar

extra:
  recipe-maintainers:
    - zbowling
    - Ubospica
