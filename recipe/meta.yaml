package:
  name: xgrammar
  version: 0.1.16

source:
  url: https://pypi.org/packages/source/x/xgrammar/xgrammar-0.1.16.tar.gz
  sha256: 4ddd5128a82d0a9c800c03df25c610368ca630704ad20a6bb7a3629f24ced442

build:
  number: 0
  script: |
    export CXXFLAGS="$CXXFLAGS -isystem $PREFIX/include"
    if [[ $(uname) == "Linux" ]]; then
      export CXXFLAGS="$CXXFLAGS -Wno-dangling-reference"
    fi
    $PYTHON -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
    - make  # [linux]
  host:
    - python
    - scikit-build-core >=0.10.0
    - pybind11 >=2.11.0
    - pip
    - dlpack
    - pytest
  run:
    - python
    - numpy >=1.26.0
    - pydantic
    - sentencepiece
    - tiktoken
    - pytorch >=1.10.0
    - transformers >=4.38.0
    - triton  # [linux]

test:
  imports:
    - xgrammar
  requires:
    - protobuf
    - pytest
    - huggingface_hub
    - numpy >=1.26.0
    - pydantic
    - sentencepiece
    - tiktoken
    - pytorch >=1.10.0
    - transformers >=4.38.0
  source_files:
    - tests/
  commands:
    - python -m pytest tests/ -m "not hf_token_required"

about:
  home: https://github.com/mlc-ai/xgrammar
  summary: XGrammar is an open-source library for efficient, flexible, and portable structured generation.
  license: Apache-2.0 AND BSD-4-Clause
  license_file:
    - LICENSE
    - NOTICE

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
  recipe-maintainers:
    - zbowling

