{% set name = "xgrammar" %}
{% set version = "0.1.18" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xgrammar-{{ version }}.tar.gz
  sha256: a0438a0f9262fff1d0e4f184268eb759f094243edce92b67eb7aa5f245c47471
  patches:
    - patches/001_remove_ninja_dep.patch

build:
  number: 2
  script:
    - export CMAKE_BUILD_TYPE=Release
    - export CXXFLAGS="$CXXFLAGS -isystem $PREFIX/include"
    - export CXXFLAGS="$CXXFLAGS -Wno-dangling-reference"
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja
    - make
    - git
  host:
    - python
    - scikit-build-core >=0.10.0
    - pip
    - dlpack
    - pytest
    - nanobind
  run:
    - python
    - numpy >=1.26.0
    - ninja
    - pydantic
    - sentencepiece
    - tiktoken
    - pytorch >=1.10.0
    - transformers >=4.38.0
    - huggingface_hub
    - protobuf
    - triton  # You can optionally condition this with Jinja if needed

test:
  imports:
    - xgrammar
  requires:
    - pytest
  commands:
    - python -m pytest tests/ -m "not hf_token_required"
  source_files:
    - tests/

about:
  homepage: https://github.com/mlc-ai/xgrammar
  summary: XGrammar is an open-source library for efficient, flexible, and portable structured generation.
  license: Apache-2.0 AND BSD-4-Clause
  license_file:
    - LICENSE
    - NOTICE

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
    - zbowling
    - Ubospica

